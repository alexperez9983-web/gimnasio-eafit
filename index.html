<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gimnasio EAFIT</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa;}
.hidden{display:none}
.btn{padding:8px 12px;cursor:pointer}
.card{background:#fff;padding:1rem;margin:1rem;border-radius:8px}
</style>
</head>

<body>

<header class="card">
  <button onclick="showView('login')">Login</button>
  <button onclick="logout()">Salir</button>
</header>

<!-- LOGIN -->
<section id="view-login" class="card">
  <form id="login-form">
    <input type="email" id="login-email" placeholder="Correo" required><br><br>
    <input type="password" id="login-password" placeholder="Contraseña" required><br><br>
    <button class="btn">Ingresar</button>
  </form>
</section>

<!-- DASHBOARD -->
<section id="view-dashboard" class="hidden">

  <div class="card">
    <h3>📊 Ocupación Canchas</h3>
    <canvas id="chart-courts"></canvas>
  </div>

  <div class="card">
    <h3>💰 Ingresos</h3>
    <canvas id="chart-revenue"></canvas>
  </div>

</section>

<div id="toast"></div>

<script>

// ==========================
// CONFIG FIREBASE
// ==========================
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
};

// ==========================
// VARIABLES
// ==========================
let auth, db, currentUser = null;

const charts = {
  courts:null,
  revenue:null
};

// ==========================
// INIT
// ==========================
try{
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
}catch(e){
  console.error(e);
}

// ==========================
// AUTH
// ==========================
function setupAuthListener(){
  auth.onAuthStateChanged(user=>{
    currentUser = user;

    if(user){
      showView('dashboard');
      loadData();
    }else{
      showView('login');
    }
  });
}

// ==========================
// LOGIN
// ==========================
document.getElementById('login-form').addEventListener('submit', async e=>{
  e.preventDefault();

  try{
    await auth.signInWithEmailAndPassword(
      login-email.value,
      login-password.value
    );
    showToast("Sesión iniciada","success");
  }catch(err){
    showToast(err.message,"error");
  }
});

function logout(){
  auth.signOut();
}

// ==========================
// DATA FIRESTORE
// ==========================
async function loadData(){

  if(!db){
    showToast("Modo demo","warning");
    return renderDemo();
  }

  try{
    const bookingsSnap = await db.collection('bookings').get();
    const bookings = bookingsSnap.docs.map(d=>d.data());

    renderCourts(bookings);
    renderRevenue(bookings);

  }catch(e){
    console.error(e);
    showToast("Error datos → modo demo","warning");
    renderDemo();
  }
}

// ==========================
// PROCESAMIENTO
// ==========================
function renderCourts(bookings){

  const counts = { 'Cancha 1':0,'Cancha 2':0,'Cancha 3':0 };

  bookings.forEach(b=>{
    if(counts[b.cancha] !== undefined){
      counts[b.cancha]++;
    }
  });

  const ctx = document.getElementById('chart-courts');

  if(charts.courts) charts.courts.destroy();

  charts.courts = new Chart(ctx,{
    type:'bar',
    data:{
      labels:Object.keys(counts),
      datasets:[{data:Object.values(counts)}]
    }
  });
}

function renderRevenue(bookings){

  const revenue = {};

  bookings.forEach(b=>{
    if(!b.fecha) return;

    const key = b.fecha;
    revenue[key] = (revenue[key] || 0) + (b.valor || 80000);
  });

  const labels = Object.keys(revenue);
  const values = Object.values(revenue);

  const ctx = document.getElementById('chart-revenue');

  if(charts.revenue) charts.revenue.destroy();

  charts.revenue = new Chart(ctx,{
    type:'line',
    data:{labels, datasets:[{data:values}]}
  });
}

// ==========================
// DEMO
// ==========================
function renderDemo(){
  renderCourts([
    {cancha:'Cancha 1'},{cancha:'Cancha 2'},{cancha:'Cancha 1'}
  ]);

  renderRevenue([
    {fecha:'2025-01-01',valor:100},
    {fecha:'2025-01-02',valor:200}
  ]);
}

// ==========================
// UI
// ==========================
function showView(id){
  document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(`view-${id}`).classList.remove('hidden');
}

// ==========================
// TOAST
// ==========================
function showToast(msg,type="info"){
  const t=document.getElementById('toast');
  t.innerText=msg;
}

// ==========================
// START
// ==========================
if(auth){
  setupAuthListener();
}else{
  showToast("Firebase no configurado","error");
}

</script>

</body>
</html>
